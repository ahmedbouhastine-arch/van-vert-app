runConfig:
  minInstances: 0

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "REDACTED_FIREBASE_AUTH_DOMAIN"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "REDACTED_FIREBASE_PROJECT_ID"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "REDACTED_FIREBASE_STORAGE_BUCKET"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "REDACTED_FIREBASE_SENDER_ID"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "REDACTED_FIREBASE_APP_ID"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_BASE_URL
    value: "https://vanvert.co"
    availability:
      - BUILD
      - RUNTIME

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - BUILD
      - RUNTIME
